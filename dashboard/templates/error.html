<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invalid Repository</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #0a0a0a, #000);
            font-family: Orbitron, sans-serif;
            color: white;
        }

        .box {
            text-align: center;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            box-shadow: 0 0 40px rgba(255,0,0,0.15);
            max-width: 500px;
        }

        .error {
            font-size: 28px;
            color: #ff3b3b;
            margin-bottom: 10px;
        }

        .sub {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .url {
            color: #fff;
            word-break: break-all;
            font-size: 13px;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        a {
            display: inline-block;
            padding: 12px 20px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.2s;
        }

        a:hover {
            transform: scale(1.05);
        }

        .glitch {
            animation: flicker 1.5s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>

<body>

<div class="box">
    <div class="error glitch">INVALID GITHUB REPOSITORY</div>

    <div class="sub">
        The system could not verify this repository format.
    </div>

    <div class="url">
        {{ url }}
    </div>

    <p style="opacity:0.6;font-size:13px;">
        Expected format:<br>
        https://github.com/username/repository
    </p>

    <br>

    <a href="/">Try Again</a>
</div>

</body>
</html>
